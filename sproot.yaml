schema_version: 1

identity:
  git_user_name: "Daniel Schwartz"
  git_user_email: "danielschwar@gmail.com"
  git_default_branch: main
  gh_username: justanotherspy

env:
  - from: GH_TOKEN
    as: GH_TOKEN
    required: true

phases:
  # ── System packages ──────────────────────────────────────────────────────────
  # Ubuntu ships bat as batcat and fd-find as fdfind; the apt module's symlinks
  # field exposes them under the expected names in ~/.local/bin.
  - type: apt
    packages:
      - apt-transport-https
      - software-properties-common
      - lsb-release
      - shellcheck
      - bat
      - btop
      - direnv
      - fd-find
      - fzf
      - hyperfine
      - jq
      - mosh
      - ncdu
      - neovim
      - netcat-openbsd
      - ripgrep
      - tealdeer
      - tmux
      - traceroute
      - yq
      - zoxide
      - xclip
    symlinks:
      - from: /usr/bin/batcat
        to: ~/.local/bin/bat
      - from: /usr/bin/fdfind
        to: ~/.local/bin/fd

  # ── Language tooling ─────────────────────────────────────────────────────────
  - type: corepack
    managers: [pnpm, yarn]

  - type: rust_components
    components: [clippy, rustfmt, rust-analyzer]

  # uv_tool installs uv itself (to /usr/local/bin) if it is not already on PATH,
  # then installs each tool. garlic's PyPI package (garlic-cli) differs from its
  # binary name, hence the pkg override.
  - type: uv_tool
    tools:
      - name: black
      - name: pre-commit
      - name: ruff
      - name: semgrep
      - name: garlic
        pkg: garlic-cli

  # ── Security tools ───────────────────────────────────────────────────────────
  # cosign first: trufflehog's release is keyless-cosign verified below.
  - type: binary_release
    name: cosign
    repo: sigstore/cosign
    version: "{tag_no_v}"
    asset: "cosign_{version}_{arch}.deb"
    install: dpkg

  - type: binary_release
    name: trufflehog
    repo: trufflesecurity/trufflehog
    version: "{tag_no_v}"
    asset: "trufflehog_{version}_linux_{arch}.tar.gz"
    checksum_asset: "trufflehog_{version}_checksums.txt"
    install: tar+install
    cosign:
      blob: "trufflehog_{version}_checksums.txt"
      signature: "trufflehog_{version}_checksums.txt.sig"
      certificate: "trufflehog_{version}_checksums.txt.pem"
      certificate_oidc_issuer: "https://token.actions.githubusercontent.com"
      certificate_identity_regexp: "https://github.com/trufflesecurity/trufflehog/.github/workflows/.*"

  - type: binary_release
    name: dive
    repo: wagoodman/dive
    version: "{tag_no_v}"
    asset: "dive_{version}_linux_{arch}.deb"
    install: dpkg

  # gitleaks names its tarball arch x64/arm64 -> {x64_arch}.
  - type: binary_release
    name: gitleaks
    repo: gitleaks/gitleaks
    version: "{tag_no_v}"
    asset: "gitleaks_{version}_linux_{x64_arch}.tar.gz"
    install: tar+install

  # hadolint ships a bare binary named x86_64 on amd64 but arm64 on arm64, which
  # matches no built-in arch token, so map it explicitly via {arch_alias}.
  - type: binary_release
    name: hadolint
    repo: hadolint/hadolint
    asset: "hadolint-Linux-{arch_alias}"
    install: raw
    arch_map:
      amd64: x86_64
      arm64: arm64

  # ── Docker ───────────────────────────────────────────────────────────────────
  - type: docker
    daemon_json:
      log-driver: json-file
      log-opts:
        max-size: "20m"
        max-file: "5"
      live-restore: true

  - type: sprite_service
    service: dockerd
    cmd: /usr/bin/dockerd

  # ── CLI tools ────────────────────────────────────────────────────────────────
  # flyctl's official installer is a curl|sh script; no GitHub-release module fits.
  - type: cmd
    run: "curl -fsSL https://fly.io/install.sh | sh -s -- --non-interactive"
    check: "which flyctl"

  # ── Claude Code ──────────────────────────────────────────────────────────────
  - type: file_template
    src: files/statusline.py
    dest: ~/.claude/statusline.py
    mode: "0755"

  - type: claude
    upgrade: true
    settings:
      permissions:
        defaultMode: bypassPermissions
      tui: fullscreen
      skipDangerousModePermissionPrompt: true
      theme: dark
      statusLine:
        type: command
        command: "python3 /home/sprite/.claude/statusline.py"

  # ── Dotfiles ─────────────────────────────────────────────────────────────────
  - type: file_template
    src: files/pre-commit-config.template.yaml
    dest: ~/.config/pre-commit/.pre-commit-config.template.yaml
    mode: "0644"

  - type: file_template
    src: files/gitignore_global
    dest: ~/.gitignore_global
    mode: "0644"

  # ── SSH / GitHub / Git identity ──────────────────────────────────────────────
  # ssh_setup: generates ed25519 keypair, populates known_hosts, registers auth
  # and signing keys with GitHub using GH_TOKEN.
  - type: ssh_setup

  # gh_token: pipes GH_TOKEN to `gh auth login --with-token --git-protocol ssh`
  # so subsequent gh commands work without a token in the environment.
  - type: gh_token

  # git_identity: sets name/email/branch + extra git config. Also sets SSH
  # commit signing config if ~/.ssh/id_ed25519.pub exists (i.e. after ssh_setup).
  - type: git_identity
    config:
      pull.rebase: "true"
      push.autoSetupRemote: "true"
      rerere.enabled: "true"
      color.ui: auto
      core.editor: vim
      fetch.prune: "true"
      core.excludesFile: "~/.gitignore_global"
      alias.lg: "log --oneline --graph --decorate --all"
      alias.last: "log -1 HEAD"
      alias.amend: "commit --amend --no-edit"
      alias.unstage: "reset HEAD --"
      alias.cleanb: "!git branch --merged | grep -vE '^\\*|^.\\s*(main|master|develop)$' | xargs -r git branch -d"

  # ── Repos ────────────────────────────────────────────────────────────────────
  - type: repo_clone
    base_dir: ~/repos
    repos:
      - justanotherspy/garlic
      - justanotherspy/poker
      - justanotherspy/sprite
      - justanotherspy/justanotherspy.com

  - type: cmd
    run: "mkdir -p $HOME/.config/sproot && garlic setup --defaults -y && date -u > $HOME/.config/sproot/garlic-defaults.applied"
    check: "test -f $HOME/.config/sproot/garlic-defaults.applied"

  # ── Shell environment ────────────────────────────────────────────────────────
  - type: file_template
    src: files/ps1.sh
    dest: ~/.local/share/sprite-setup/ps1.sh
    mode: "0644"

  - type: cmd
    run: |
      mkdir -p $HOME/.zsh/completions
      for pair in "gh:gh completion -s zsh" "flyctl:flyctl completion zsh" "uv:uv generate-shell-completion zsh" "cosign:cosign completion zsh"; do
        tool="${pair%%:*}"; cmd="${pair#*:}"; dest="$HOME/.zsh/completions/_${tool}"
        [ -f "$dest" ] && continue
        command -v "${cmd%% *}" >/dev/null 2>&1 && eval "$cmd" > "$dest" 2>/dev/null || rm -f "$dest"
      done
    check: "test -d $HOME/.zsh/completions"

  - type: rc_block
    src: files/rc_additions.sh
